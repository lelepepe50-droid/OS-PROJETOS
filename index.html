<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Venda de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 10px; }
        input { padding: 8px; margin-right: 10px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; }
        .delete-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <h2>Cadastro de Venda de Carros</h2>

    <div class="form-group">
        <input type="text" id="marca" placeholder="Marca (ex: Fiat)">
        <input type="text" id="modelo" placeholder="Modelo (ex: Uno)">
        <input type="number" id="ano" placeholder="Ano (ex: 2022)">
        <input type="number" id="preco" placeholder="Preço R$">
        <button onclick="adicionarCarro()">Adicionar Carro</button>
    </div>

    <table id="tabelaCarros">
        <thead>
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Ano</th>
                <th>Preço</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <!-- Os carros serão adicionados aqui -->
        </tbody>
    </table>

    <script>
        function adicionarCarro() {
            // Pegar valores dos inputs
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;
            const ano = document.getElementById('ano').value;
            const preco = document.getElementById('preco').value;

            // Verificar se os campos estao preenchidos
            if (marca === '' || modelo === '' || ano === '' || preco === '') {
                alert('Por favor, preencha todos os campos!');
                return;
            }

            // Criar nova linha na tabela
            const tabela = document.getElementById('tabelaCarros').getElementsByTagName('tbody')[0];
            const novaLinha = tabela.insertRow();

            // Inserir celulas
            novaLinha.innerHTML = `
                <td>${marca}</td>
                <td>${modelo}</td>
                <td>${ano}</td>
                <td>R$ ${parseFloat(preco).toFixed(2)}</td>
                <td><button class="delete-btn" onclick="removerCarro(this)">Remover</button></td>
            `;

            // Limpar inputs
            document.getElementById('marca').value = '';
            document.getElementById('modelo').value = '';
            document.getElementById('ano').value = '';
            document.getElementById('preco').value = '';
        }

        function removerCarro(botao) {
            const linha = botao.parentNode.parentNode;
            linha.parentNode.removeChild(linha);
        }
    </script>

</body>
</html>
