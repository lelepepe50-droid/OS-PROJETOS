        <h2>volkswagen</h2>
        <P>A história da Volkswagen (VW) começou na Alemanha em 1937, idealizada como o "carro do povo" (Volkswagen) sob o regime nazista para criar um veículo acessível. Projetado por Ferdinand Porsche, o icônico Fusca tornou-se a base da empresa. A marca se expandiu globalmente e chegou ao Brasil em 1953, consolidando-se como uma das maiores produtoras de automóveis do país.</P>
        <img src="img/Amarok.jpg"width="400"height="200" alt="volkswagen">
        <FIgcaption>Lançada em 2010 como a primeira picape média da Volkswagen, a Amarok foi projetada para combinar robustez com a dirigibilidade de um carro de passeio. Produzida na Argentina, destacou-se pelo conforto e estabilidade, mas enfrentou críticas iniciais sobre a mecânica 2.0. O modelo foi revolucionado em 2018 com o motor V6, tornando-se referência em potência. </FIgcaption>
        <img src="img/Gol.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>O Volkswagen Gol, lançado em 15 de maio de 1980, foi o líder de vendas no Brasil por 27 anos consecutivos (1987-2014). Projetado para substituir o Fusca, o hatch marcou época com motor a ar e depois a água, consolidando-se com diversas gerações (G1 a G7) e encerrando sua trajetória em 2022 após 42 anos de produção.</figcaption>
        <img src="img/Polo.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>Lançado na Europa em 1975 como uma versão econômica do Audi 50, o Volkswagen Polo consolidou-se como um hatch compacto premium, vendendo mais de 16 milhões de unidades em seis gerações [5.5, 5.6]. No Brasil, destacou-se desde 2002 pela tecnologia (solda a laser no 9N) e hoje se posiciona como um hatch moderno, baseado na plataforma MQB [5.1, 5.13].</figcaption>
        <img src="img/T-Cross.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>Volkswagen T-Cross é um SUV compacto lançado oficialmente no Brasil em abril de 2019. Produzido em São José dos Pinhais (PR) sobre a plataforma modular MQB A0 (a mesma do Polo), ele se tornou um sucesso de vendas, destacando-se por motores turbo (1.0 TSI e 1.4 TSI), bom espaço interno e pacote tecnológico.</figcaption>
        <img src="img/Voyage.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>Lançado em julho de 1981, o Volkswagen Voyage foi um marco como a versão sedã da "família BX" (que incluía Gol, Parati e Saveiro). Reconhecido pelo seu porta-malas espaçoso, o modelo brasileiro, com motor refrigerado a água, foi um grande sucesso de vendas, sendo exportado e produzido até 1995, retornando em 2008 para novas gerações até seu fim em 2023.</p>
        <figcaption>
        <img src="img/Fusca.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>O Volkswagen Fusca, projetado por Ferdinand Porsche na Alemanha nos anos 30 por ordem de Adolf Hitler, tornou-se um ícone mundial de robustez e economia. Com mais de 21 milhões de unidades produzidas, o "carro do povo" (Volkswagen) marcou gerações com seu motor traseiro refrigerado a ar e design atemporal, sendo fabricado de 1938 a 2003.</p></figcaption>
        </figure>
        <img src="img/Kombi.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>A Volkswagen Kombi, cujo nome deriva do alemão Kombinationsfahrzeug ("veículo combinado"), foi lançada em 1950 na Alemanha. Nascida da ideia do importador holandês Ben Pon e baseada no Fusca, tornou-se um ícone mundial de versatilidade. No Brasil, iniciou produção em 1957, sendo o primeiro carro nacional da marca, e permaneceu em linha até 2013.</p></figcaption>
        <img src="img/parati.jpg"width="400"height="200" alt="volkswagen">
        <figcaption>Lançada em junho de 1982, a Volkswagen Parati foi uma icônica perua brasileira derivada do Gol, produzida até 2012. Conhecida pela versatilidade e robustez, marcou gerações com motorizações a ar (inicialmente) e depois os famosos motores AP (1.6, 1.8 e 2.0), incluindo versões esportivas como a raríssima GTI e a aventureira Crossover.</p></figcaption>

        <h3>Fiat</h3>
        <P>A Yamaha surgiu em 1887 com Torakusu Yamaha como uma fábrica de instrumentos musicais, a Nippon Gakki, que mais tarde se tornou Yamaha Corporation.</P>
        <img src="img/ybr 125.jpg"width="400"height="200" alt="YAMAHA">
        <figcaption>A Honda Twister 250 é uma moto street com motor monocilíndrico de 249,5 cc, popular pelo bom desempenho tanto na cidade quanto na estrada, além de ser econômica. </figcaption>
        <img src="img/Factor 150.jpg"width="400"height="200" alt="YAMAHA">
        <figcaption>A Yamaha Factor 150 é uma moto urbana conhecida por sua economia de combustível, baixo peso (127 kg) e design moderno</figcaption>
        <img src="img/Crosser 150.jpg"width="400"height="200" alt="YAMAHA">
        <figcaption>A Yamaha Crosser 150 é uma moto trail de entrada para uso misto (asfalto e terra) com motor monocilíndrico de \(149\) cc, freio ABS na dianteira e suspensões de longo curso.</figcaption>
        <img src="img/FZ250.jpg"width="400"height="200" alt="YAMAHA">
        <figcaption>A Fazer 250 é uma motocicleta urbana e de uso misto, reconhecida por sua durabilidade, baixo consumo, tecnologia Blue Flex (gasolina e etanol) e sistema de freios ABS de série.</figcaption>

            <h4>honda</h4>
            <P>A Haojue é uma fabricante chinesa de motocicletas fundada em 1992, famosa por sua parceria de joint venture com a Suzuki desde então.</P>
            <img src="img/suzuki yes 125.jpg"width="400"height="200" alt="suzuki">
            <figcaption>A Suzuki EN 125 Yes foi uma moto popular de entrada, lançada no Brasil de 2004 a 2011, conhecida por seu design urbano, economia e recursos como freio a disco dianteiro e indicador de marcha.</figcaption>
            <img src="img/DK 150.jpg"width="400"height="200" alt="Haojue">
            <figcaption>A Haojue DK 150 é uma motocicleta urbana que combina desempenho econômico e praticidade, ideal para o uso diário. </figcaption>
            <img src="img/NK 150.jpg"width="400"height="200" alt="Haojue">
            <figcaption>A Haojue NK 150 é uma moto trail urbana de baixa cilindrada, versátil para uso na cidade e em estradas de terra. </figcaption>
            <img src="img/DR 250.jpg    "width="400"height="200" alt="Haojue">
            <figcaption>A Haojue DR 250 é uma motocicleta bicilíndrica lançada na China em 2020, com motor de 250 cm³, 25 cv de potência e 2,4 kgf.m de torque. </figcaption>
        </figure>

           <img src="img/Worker 125.jpg"width="400"height="200" alt="SHINERAY">
